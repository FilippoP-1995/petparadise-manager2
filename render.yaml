services:
  - type: web
    name: pet-paradise-manager
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PPM_HOST
        value: 0.0.0.0
      - key: PPM_DATA_DIR
        value: /var/data
      - key: TZ
        value: Europe/Rome
      - key: WHATSAPP_CRON_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:assistenza@petparadise.it
    disk:
      name: pet-paradise-data
      mountPath: /var/data
      sizeGB: 1
  - type: cron
    name: pet-paradise-whatsapp-cron
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_whatsapp.py
    schedule: "*/5 * * * *"
    envVars:
      - key: TZ
        value: Europe/Rome
      - key: WHATSAPP_CRON_URL
        sync: false
      - key: WHATSAPP_CRON_SECRET
        sync: false
